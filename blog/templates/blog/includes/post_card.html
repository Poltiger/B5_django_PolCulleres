{% load static %}
<div class="card h-100">
    <a href="{% url 'post-detail-page' post.slug %}">
        <img src="{% static 'blog/images/' %}{{ post.image_name }}" class="card-img-top post-card-img" alt="{{ post.title }}">
    </a>
    <div class="card-body">
        <h5 class="card-title">
            <a href="{% url 'post-detail-page' post.slug %}" class="text-decoration-none text-dark">{{ post.title }}</a>
        </h5>
        <p class="card-text text-muted small">{{ post.excerpt|truncatechars:100 }}</p>
    </div>
</div>
